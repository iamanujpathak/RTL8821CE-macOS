name: Build & Release

# Build the RTW88Server.kext + RTW88Client + rtwd + the RTW88Menu.app GUI on every
# push to main and publish them, plus a one-download install bundle, as a Release.
# Everything is x86_64 (the card is Intel-Mac/Hackintosh only); the macos-14 runner
# is arm64 but every build step forces -arch/-target x86_64.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build RTW88Server.kext
        run: bash server/build.sh

      - name: Build RTW88Client + rtwd
        run: bash client/build.sh

      - name: Build RTW88Menu.app (menu-bar GUI)
        run: bash client/gui/build-app.sh

      - name: Verify everything is x86_64
        run: |
          set -e
          file dist/RTW88Server.kext/Contents/MacOS/RTW88Server | grep -q x86_64
          file build/client/RTW88Client                          | grep -q x86_64
          file build/client/rtwd                                 | grep -q x86_64
          file build/client/RTW88Menu.app/Contents/MacOS/RTW88Menu | grep -q x86_64

      - name: Package artifacts + install bundle
        run: |
          set -e
          mkdir -p out
          # ad-hoc sign the bundles so they load locally (OpenCore needs no Developer ID)
          codesign --force --sign - dist/RTW88Server.kext || true
          codesign --force --deep --sign - build/client/RTW88Menu.app || true

          # ---- individual artifacts ----
          ditto -c -k --sequesterRsrc --keepParent dist/RTW88Server.kext        out/RTW88Server.kext.zip
          ditto -c -k --sequesterRsrc --keepParent build/client/RTW88Menu.app   out/RTW88Menu.app.zip
          cp build/client/RTW88Client out/RTW88Client
          cp build/client/rtwd        out/rtwd
          chmod +x out/RTW88Client out/rtwd

          # ---- one-download install bundle (prebuilt; copy-only installer) ----
          B=out/RTW88-macOS
          mkdir -p "$B"
          cp -R dist/RTW88Server.kext        "$B/"
          cp -R build/client/RTW88Menu.app   "$B/"
          cp build/client/RTW88Client build/client/rtwd "$B/"
          cp dist/install-bundle.sh          "$B/install.sh"
          cp dist/com.rtw88.client.plist     "$B/"
          cp dist/com.rtw88.rtwd.plist       "$B/"
          cp dist/rtw88-eth-netcfg.sh        "$B/"
          cp client/rtw88.conf.example       "$B/"
          chmod +x "$B/RTW88Client" "$B/rtwd" "$B/install.sh" "$B/rtw88-eth-netcfg.sh"
          ditto -c -k --sequesterRsrc --keepParent "$B" out/RTW88-macOS.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="v0.1.${{ github.run_number }}"
          # notes via file (avoids YAML-indent-as-markdown-codeblock + --notes/--generate-notes clashes)
          printf '%s\n' \
            'Prebuilt x86_64 (Intel Mac / Hackintosh).' \
            '' \
            '**One-download install:** grab `RTW88-macOS.zip`, unzip, then:' \
            '- GUI (menu-bar app): `sudo bash install.sh --gui`' \
            '- Headless (auto-connect from config): `sudo bash install.sh`' \
            '' \
            'First kext install needs approval in System Settings > Privacy & Security, then one reboot.' \
            'Individual artifacts (kext, RTW88Menu.app, RTW88Client, rtwd) are also attached.' \
            > out/NOTES.md
          gh release create "$TAG" \
            out/RTW88-macOS.zip \
            out/RTW88Server.kext.zip \
            out/RTW88Menu.app.zip \
            out/RTW88Client \
            out/rtwd \
            --title "RTW88 $TAG" \
            --target "${{ github.sha }}" \
            --notes-file out/NOTES.md
